<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDA — Скачать графический редактор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: rgba(30, 30, 50, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 50px;
            max-width: 550px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #4CAF50, #2e7d32);
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 18px 45px;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.3s ease;
            margin: 15px 0;
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(76, 175, 80, 0.6);
        }

        .version {
            color: #666;
            font-size: 0.8rem;
            margin: 10px 0;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 30px 0;
        }

        .feature {
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #ccc;
        }

        footer {
            margin-top: 25px;
            color: #555;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>EDA</h1>
        <div class="subtitle">Enjoy Draw Art — рисуй с удовольствием</div>

        <a href="https://github.com/Marattor/EDA-website/releases/download/v0.87/EDA_Setup.exe" class="download-btn">
            ⬇️ Скачать EDA
            </a>

        <div class="version">Версия 0.87 BETA | Windows | ~15 МБ</div>

        <div class="features">
            <span class="feature">🎨 Кисти</span>
            <span class="feature">🖌️ Спрей</span>
            <span class="feature">📐 Фигуры</span>
            <span class="feature">🔄 Зум</span>
            <span class="feature">💾 Undo/Redo</span>
            <span class="feature">📤 Экспорт</span>
        </div>

        <footer>
            Бесплатно • Просто • Быстро
        </footer>
    </div>
</body>
</html>
